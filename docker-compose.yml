services:
  db:
    image: mysql:8.0
    container_name: wp-go-reg-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wordpress-network

  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    container_name: wp-go-reg-wordpress
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - wordpress_data:/var/www/html
      # Mount the plugin directory
      - .:/var/www/html/wp-content/plugins/go-tournament-registration
    networks:
      - wordpress-network

  wpcli:
    depends_on:
      - db
      - wordpress
    image: wordpress:cli
    container_name: wp-go-reg-cli
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - wordpress_data:/var/www/html
      - .:/var/www/html/wp-content/plugins/go-tournament-registration
    networks:
      - wordpress-network
    entrypoint: ["wp", "--allow-root"]
    command: ["--info"]

volumes:
  db_data:
  wordpress_data:

networks:
  wordpress-network:
    driver: bridge
