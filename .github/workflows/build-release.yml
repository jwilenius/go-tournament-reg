name: Build and Release Plugin

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get plugin version
        id: version
        run: |
          VERSION=$(grep "Version:" go-tournament-registration.php | head -1 | awk -F: '{print $2}' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Plugin version: $VERSION"

      - name: Create distribution ZIP
        run: |
          git archive --format=zip --prefix=go-tournament-registration/ HEAD -o go-tournament-registration.zip

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-tournament-registration-${{ steps.version.outputs.version }}
          path: go-tournament-registration.zip
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: go-tournament-registration.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
